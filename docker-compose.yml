services:
  qr-system:
    build: .
    container_name: qr-system
    ports:
      - "5057:5057"
    environment:
      PORT: 5057
      # HTTP mode. QR stores only its code so it works from any app URL/IP.
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-}
      QR_PAYLOAD_MODE: ${QR_PAYLOAD_MODE:-code}
    volumes:
      - ./server/data:/app/server/data
    restart: unless-stopped
