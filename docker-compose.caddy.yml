services:
  qr-system:
    build: .
    container_name: qr-system
    environment:
      PORT: 5057
      # Replace this in your .env file with your real PC LAN IP, e.g. https://192.168.1.20:8443
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-https://localhost:8443}
    volumes:
      - ./server/data:/app/server/data
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: qr-system-caddy
    depends_on:
      - qr-system
    ports:
      - "8443:8443"
    volumes:
      - ./Caddyfile.docker:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
